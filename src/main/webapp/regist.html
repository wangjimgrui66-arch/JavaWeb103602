<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
</head>
<body>
<h1>用户注册</h1>
<form action="AddUserServlet" method="post">
    用户名：<input type="text" name="username"><br>
    籍贯：<select name="nation">
    <option value="shanxi">山西</option>
    <option value="hebei">河北</option>
    <option value="shandong">山东</option>
</select><br>
    性别：<input type="radio" name="gender" value="male">男
    <input type="radio" name="gender" value="female">女<br>
    爱好：<input type="checkbox" name="love" value="travel">旅游
    <input type="checkbox" name="love" value="run">跑步
    <input type="checkbox" name="love" value="shopping">逛街<br>
    自我介绍：<br><textarea name="intro"></textarea><br>
    <input type="submit">
</form>
</body>
</html>
